<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="theme-color" content="#fdfeff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="blur">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>blur</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="./assets/icon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="./assets/icon-180.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="app" aria-live="polite"></main>
    <input id="photo-input" hidden type="file" accept="image/*" capture="environment">
    <input id="album-input" hidden type="file" accept="image/*,video/*">
    <input id="avatar-input" hidden type="file" accept="image/*">
    <script type="module" src="./app.js"></script>
  </body>
</html>
